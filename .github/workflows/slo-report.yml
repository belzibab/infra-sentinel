name: Daily SLO Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  slo-report:
    name: Generate SLO Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run SLO Report
        run: python src/slo_calculator/slo_calculator.py
